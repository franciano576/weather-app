<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="triangulo.css" />
    <title>triangulo</title>
  </head>
  <body>
    <svg viewBox="0 0 100 100">
      <polygon points="50,10 90 10 ,90" />

      <line x1="50" y1="10" x2="90" y2="90" stroke="red" />
      <!-- lado AB -->
      <line x1="90" y1="90" x2="10" y2="90" stroke="blue" />
      <!-- lado BC -->
      <line x1="10" y1="90" x2="50" y2="10" stroke="green" />
      <text x="50" y="8">A</text>
      <!-- topo -->
      <text x="92" y="92">B</text>
      <!-- canto direito -->
      <text x="5" y="92">C</text>
    </svg>
  </body>
</html>
