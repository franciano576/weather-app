<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div class="player">
      <h2>🎵 Tocando música da pasta "audio"</h2>
      <!-- Caminho para o arquivo dentro da pasta -->
      <audio
        id="meuAudio"
        src="../audio/tutaguedesoficial-tome-cerveja-b3d08be4.mp3"
      ></audio>

      <div>
        <button onclick="document.getElementById('meuAudio').play()">
          ▶ Play
        </button>
        <button onclick="document.getElementById('meuAudio').pause()">
          ⏸ Pause
        </button>
      </div>
    </div>
  </body>
</html>
